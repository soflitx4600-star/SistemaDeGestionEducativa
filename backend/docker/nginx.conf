user www-data;
worker_processes auto;
pid /run/nginx.pid;
events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    server_tokens off;
    client_max_body_size 20M;

    server {
        listen 80;
        server_name _;
        root /var/www/public;
        index index.php index.html;

        # 1. Archivos Estáticos (CRÍTICO: servir directamente sin redirigir a PHP)
        location ~* \.(css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            expires 1y;
        }

        # 2. Denegar acceso a archivos ocultos
        location ~ /\.ht {
            deny all;
        }

        # 3. Manejo General (rutas hacia index.php)
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # 4. Manejo de PHP
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            # Headers para proxy reverso (Easypanel)
            fastcgi_param HTTPS on; 
            fastcgi_param HTTP_X_FORWARDED_PROTO https;
            fastcgi_param HTTP_X_FORWARDED_HOST $server_name;
            fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        }
    }
}